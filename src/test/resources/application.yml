# ============================================================
# 测试环境配置 — 使用 H2 内存数据库，无需外部 MySQL
# ============================================================

spring:
  # 排除尚未实现模块的自动配置，避免启动报错
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

  # Spring AI 占位 API Key（测试环境同样需要）
  ai:
    openai:
      api-key: placeholder-test
    deepseek:
      api-key: placeholder-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.czltnb.zhi_xiang_backend.user.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.czltnb.zhi_xiang_backend.user.mapper: DEBUG
