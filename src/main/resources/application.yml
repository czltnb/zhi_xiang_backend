# ============================================================
# 知享 (ZhiXiang) 后端 — 应用配置
# 参照源项目结构，仅为本地环境差异做自定义
# ============================================================

server:
  port: 8080

spring:
  profiles:
    active: dev
  # 排除尚未实现模块的自动配置，避免启动报错
  # 随着模块逐个实现，逐步移除此列表
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/zhiguang?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  elasticsearch:
    uris: http://localhost:9200
  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
      password: qwe123!@#

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      enable-idempotence: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.czltnb.zhi_xiang_backend.user.domain,com.czltnb.zhi_xiang_backend.auth.model,com.czltnb.zhi_xiang_backend.knowpost.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.czltnb.zhi_xiang_backend: DEBUG
    org.springframework.web: INFO

# ==================== Auth（JWT 认证配置） ====================
auth:
  jwt:
    issuer: zhiguang
    access-token-ttl: 15m
    refresh-token-ttl: 7d
    key-id: zhiguang-key
    private-key: classpath:keys/private.pem
    public-key: classpath:keys/public.pem
  verification:
    code-length: 6
    ttl: 5m
    send-interval: 60s
    max-attempts: 5
    daily-limit: 10
  password:
    bcrypt-strength: 12
    min-length: 8

oss:
  endpoint: oss-cn-shanghai.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET}
  bucket: zhixiang1023
  public-domain: ${OSS_PUBLIC_DOMAIN:}
  folder: avatars

cache:
  l2:
    public-cfg:
      ttl-seconds: 15
      max-size: 1000
    mine-cfg:
      ttl-seconds: 10
      max-size: 1000
    detail-cfg:
      ttl-seconds: 30
      max-size: 5000
  hotkey:
    window-seconds: 60
    segment-seconds: 10
    level-low: 50
    level-medium: 200
    level-high: 500
    extend-low-seconds: 20
    extend-medium-seconds: 60
    extend-high-seconds: 120

counter:
  rebuild:
    lock: #锁相关配置
      ttl-ms: 5000 #锁的存活时间：5s
      watchdog-ms: 30000
    rate: #限流相关配置：表示10s内最多允许3次 rebuild 重建操作
      permits: 3 #许可数量：3个
      window-seconds: 10 #时间窗口：10s
    backoff: #退避重试相关配置
      base-ms: 500 # 基础等待时间：0.5s
      max-ms: 30000 # 最大等待时间：30s